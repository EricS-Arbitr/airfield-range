---
# fuel_plc — OpenPLC v3 runtime as a Docker container on ff-plc-1.
# Serves the SCADA-bus Modbus TCP image on :502 (per §4 register map) and
# the OpenPLC web UI on :8080. This role also uploads the compiled ST
# program (files/fuel_farm.st) via the web API and starts the runtime so
# :502 opens without any manual web-UI clicks.
#
# fdamador/openplc image note: openplc.db lives inside the container at
# /workdir/webserver/openplc.db and is NOT persisted by the current
# volume mounts. That's intentional -- every deploy re-uploads the ST via
# the bootstrap script, which is idempotent (no-op if runtime is already
# Running with our program) and gives us a deterministic state across
# range resets. Persistence tuning is a follow-up.

- name: Install docker + python bindings + requests (for bootstrap script)
  ansible.builtin.apt:
    name:
      - docker.io
      - python3-docker
      - python3-requests
    state: present
    update_cache: yes

- name: Ensure docker daemon running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Directory for OpenPLC persistent state + program upload
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/openplc/etc
    - /opt/openplc/programs
    - /opt/openplc/bin

- name: Upload ST program (SCADA-bus register map matches group_vars/fuel.yml)
  ansible.builtin.copy:
    src: fuel_farm.st
    dest: /opt/openplc/programs/fuel_farm.st
    mode: '0644'
  register: st_program

- name: Deploy OpenPLC bootstrap script
  ansible.builtin.copy:
    src: openplc_bootstrap.py
    dest: /opt/openplc/bin/openplc_bootstrap.py
    mode: '0755'

# See build sheet §4: interlocks, coil/discrete/register map, and the
# SCADA-bus Modbus TCP server on 502. Bind port 502 to the production
# NIC (Fuel-PLC /29) so the field-bus (polling fuel-farm-sim) and the
# SCADA-bus (served to control-room-hmi + fuel-hist) both cross
# bs-modbus-gateway as designed.
- name: Run OpenPLC v3 runtime container
  community.docker.docker_container:
    name: openplc
    # OpenPLC has no "official" Docker image on Docker Hub -- both
    # `openplcproject/openplc_v3` and `thiagoralves/openplc_v3` return
    # 404. Community image `fdamador/openplc` (57k pulls, dominant vs.
    # ~1k on any alternative per Hub search 2026-07-16) is the de facto
    # standard. Not maintained by OpenPLC project directly; if it starts
    # to lag, revisit either (a) another user fork, or (b) building from
    # source in the role via git clone + ./install.sh.
    image: fdamador/openplc:latest
    restart_policy: unless-stopped
    published_ports:
      - "{{ fuel_plc_ip }}:{{ fuel_modbus_port }}:502"        # SCADA-bus
      - "{{ fuel_plc_ip }}:{{ openplc_web_port }}:8080"       # web UI
    volumes:
      - /opt/openplc/etc:/workdir/etc
      - /opt/openplc/programs:/workdir/programs
    env:
      OPENPLC_ADMIN_USER: "{{ openplc_admin_user }}"
      OPENPLC_ADMIN_PASSWORD: "{{ openplc_admin_password }}"
    state: started
  register: openplc_container

- name: Wait for OpenPLC web UI :8080 to answer
  ansible.builtin.wait_for:
    host: "{{ fuel_plc_ip }}"
    port: "{{ openplc_web_port }}"
    timeout: 60

# Cred rotation policy: the fdamador image reads OPENPLC_ADMIN_USER /
# _PASSWORD from env on FIRST boot only, seeding openplc.db. Because the
# DB isn't persisted here (see role header), every container start is a
# "first boot" -- so the vault-supplied creds are always applied. If we
# later add DB persistence, this role needs a rotate_admin_creds step
# that POSTs to /change_password. Tracked in UPSTREAM_FIXES.md.

# Idempotent upload: bootstrap script exits 0 without touching state if
# the runtime is already Running with our program. On changes to
# fuel_farm.st (st_program.changed), we still run it, and it will
# stop-runtime -> upload-fresh -> start. Runs on the target host itself
# so it talks to the loopback-ish {{ fuel_plc_ip }}:8080 without going
# through mgmt-plane proxy.
- name: Bootstrap OpenPLC (upload ST + start runtime, idempotent)
  ansible.builtin.command:
    argv:
      - /opt/openplc/bin/openplc_bootstrap.py
      - --host={{ fuel_plc_ip }}
      - --port={{ openplc_web_port }}
      - --user={{ openplc_admin_user }}
      - --password={{ openplc_admin_password }}
      - --program-name=fuel_farm
      - --program-file=/opt/openplc/programs/fuel_farm.st
  register: bootstrap_result
  changed_when: "'no change' not in bootstrap_result.stdout"
