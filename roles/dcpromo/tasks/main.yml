---
# dcpromo — promote a Windows Server to a Domain Controller.
#
# Two modes, driven by whether `parent_domain_name` is set for the host:
#
#   1. FOREST ROOT (parent_domain_name is NOT defined)
#      Uses microsoft.ad.domain to create a brand-new forest with the host
#      as its first DC. Example: bs-dc01 becomes the forest root for
#      blackstone.mil.
#
#   2. CHILD DOMAIN (parent_domain_name IS defined, e.g. fops.yml sets it
#      to "blackstone.mil")
#      Uses win_powershell to run Install-ADDSDomain -DomainType ChildDomain
#      because microsoft.ad.domain doesn't expose the ChildDomain flag as of
#      collection version 2.x. Example: fops-dc01 joins the existing
#      blackstone.mil forest as a child, giving fops.blackstone.mil with
#      automatic parent/child trust.
#
# Ordering: run this role against the forest root FIRST, then against the
# child domain DC. site.yml enforces this by splitting into two plays:
# `dcpromo (forest root)` targeting [pdc_blackstone], then `dcpromo (child
# domain)` targeting [pdc_fops].

- name: Install RSAT ADDS
  ansible.windows.win_feature:
    name: "rsat-ADDS"
    state: present

- name: Install RSAT DNS
  ansible.windows.win_feature:
    name: "rsat-DNS-Server"
    state: present

- name: local admin guest customization fix - Server 2019
  ansible.windows.win_shell: "net user administrator /passwordreq:yes"

- name: local admin guest customization fix - Server 2022
  ansible.windows.win_user:
    name: administrator
    password: "{{ domain_admin_password }}"
    password_never_expires: yes
    account_disabled: no

# --- Mode 1: forest root ----------------------------------------------------
- name: Create forest root domain (this host becomes first DC)
  microsoft.ad.domain:
    dns_domain_name: "{{ domain_name }}"
    safe_mode_password: "{{ domain_admin_password }}"
  register: dcpromo_forest
  notify: Reboot Windows
  when: parent_domain_name is not defined

# --- Mode 2: child domain ---------------------------------------------------
# The child-domain DC needs to reach the parent forest root via DNS to
# authenticate the domain creation. We set the mgmt IP's primary DNS to
# point at the forest root's public IP before running Install-ADDSDomain,
# so name resolution + LDAP find the parent.
#
# `Install-ADDSDomain -DomainType ChildDomain` takes:
#   -NewDomainName <label-only>    (e.g. "fops" for fops.blackstone.mil)
#   -ParentDomainName <parent FQDN> (e.g. "blackstone.mil")
#   -Credential <Enterprise Admin> (parent-forest admin required)
#
# We derive NewDomainName from domain_name by stripping the parent suffix.
- name: Compute child-domain label from domain_name minus parent_domain_name
  ansible.builtin.set_fact:
    child_domain_label: "{{ domain_name | regex_replace('\\.' + (parent_domain_name | regex_escape) + '$', '') }}"
  when: parent_domain_name is defined

# `Install-ADDSDomain` lives in the ADDSDeployment PowerShell module, which
# only ships once the AD-Domain-Services Windows Feature is installed. The
# forest-root path uses microsoft.ad.domain which auto-installs the feature;
# the child-domain path uses win_powershell directly, so we have to install
# it explicitly here. `include_management_tools: true` gives us the RSAT-ADDS
# module bundle as well (superset of the `rsat-ADDS` install at the top of
# this role, but idempotent -- ok to double-install).
- name: Install AD-Domain-Services + management tools (child-domain path)
  ansible.windows.win_feature:
    name: AD-Domain-Services
    state: present
    include_management_tools: true
  register: adds_feature_install
  when: parent_domain_name is defined

- name: Reboot if AD-Domain-Services install requires it
  ansible.windows.win_reboot:
  when:
    - parent_domain_name is defined
    - adds_feature_install.reboot_required | default(false)

- name: Check if host is already a DC for {{ domain_name | default('') }}
  ansible.windows.win_shell: |
    $cs = Get-WmiObject Win32_ComputerSystem
    if ($cs.PartOfDomain -and $cs.Domain -eq '{{ domain_name }}') { 'ALREADY_JOINED' } else { 'NEEDS_PROMOTION' }
  register: child_dc_state
  changed_when: false
  when: parent_domain_name is defined

# Install-ADDSDomain for a child domain requires Enterprise Admin (EA)
# credentials in the parent forest -- creating a new domain modifies the
# Partitions container in the forest's Configuration NC, which only EAs
# can write to. `simspace` is a Domain Admin (per create_users role) but
# NOT an EA by default -- only the built-in Administrator gets auto-EA
# on forest-root install. So we grant EA to `domain_admin` on the parent
# PDC before running Install-ADDSDomain. Delegated to bs-dc01 (the
# forest root) so we can call Add-ADGroupMember against the local
# Enterprise Admins group. Idempotent: Add-ADGroupMember is a no-op if
# the user is already a member. See UPSTREAM_FIXES.md 2026-07-07.
- name: Grant Enterprise Admin to {{ domain_admin }} on parent forest ({{ parent_domain_name | default('') }})
  ansible.windows.win_shell: |
    try {
      Add-ADGroupMember -Identity 'Enterprise Admins' -Members '{{ domain_admin }}' -ErrorAction Stop
      "EA_GRANTED"
    } catch {
      if ($_.Exception.Message -match 'already a member') { "ALREADY_EA" }
      else { throw }
    }
  delegate_to: "{{ groups['pdc_blackstone'] | first }}"
  register: ea_grant
  changed_when: "'EA_GRANTED' in ea_grant.stdout"
  when:
    - parent_domain_name is defined
    - "'NEEDS_PROMOTION' in child_dc_state.stdout"

# Chicken-and-egg: Install-ADDSDomain needs to resolve
# _ldap._tcp.{{ parent_domain_name }} SRV records to find the parent
# forest DC to authenticate against. But fops-dc01's default primary DNS
# is set to itself + sibling (both fops.blackstone.mil DCs), neither of
# which can answer for blackstone.mil until child promotion completes.
# So we point primary DNS at the parent PDC (bs-dc01) for the duration
# of promotion. After Install-ADDSDomain finishes + reboot, fops-dc01 is
# itself a DC and hosts fops.blackstone.mil; a later play can restore
# the intended DNS if needed. See UPSTREAM_FIXES.md 2026-07-07.
- name: Point primary DNS at parent PDC before Install-ADDSDomain
  ansible.windows.win_shell: |
    $iface = Get-DnsClientServerAddress -AddressFamily IPv4 |
      Where-Object { $_.ServerAddresses.Count -gt 0 } |
      Select-Object -First 1
    if ($iface) {
      Set-DnsClientServerAddress `
        -InterfaceIndex $iface.InterfaceIndex `
        -ServerAddresses '{{ parent_domain_pdc_ip }}','8.8.8.8'
      # Force a fresh SRV resolution on next lookup
      Clear-DnsClientCache
      "SET_DNS_OK:$($iface.InterfaceAlias)"
    } else { "NO_IFACE_FOUND" }
  register: parent_dns_set
  changed_when: "'SET_DNS_OK' in parent_dns_set.stdout"
  when:
    - parent_domain_name is defined
    - "'NEEDS_PROMOTION' in child_dc_state.stdout"

- name: Create child domain (this host becomes first DC of {{ domain_name | default('') }})
  ansible.windows.win_powershell:
    script: |
      $ErrorActionPreference = 'Stop'
      Import-Module ADDSDeployment -ErrorAction Stop
      $pw = ConvertTo-SecureString '{{ domain_admin_password }}' -AsPlainText -Force
      # Credential must be Enterprise Admin in the PARENT forest. `simspace`
      # is Domain Admin in the parent (per Create Users play); auto-promoted
      # into Enterprise Admins on forest-root install.
      $cred = New-Object System.Management.Automation.PSCredential(
        '{{ parent_domain_name }}\{{ domain_admin }}', $pw)
      try {
        $result = Install-ADDSDomain `
          -NewDomainName '{{ child_domain_label }}' `
          -ParentDomainName '{{ parent_domain_name }}' `
          -DomainType ChildDomain `
          -DomainMode 'WinThreshold' `
          -InstallDns `
          -Credential $cred `
          -SafeModeAdministratorPassword $pw `
          -Force -NoRebootOnCompletion -ErrorAction Stop
        # Install-ADDSDomain returns an object with a Status field on success.
        # On success it's "Success" (SimSpace: verified 2026-07-07).
        if ($result.Status -eq 'Success') {
          $Ansible.Changed = $true
          Write-Output "PROMOTION_OK"
        } else {
          $Ansible.Failed = $true
          Write-Output "PROMOTION_FAILED status=$($result.Status) msg=$($result.Message)"
        }
      } catch {
        $Ansible.Failed = $true
        Write-Output "PROMOTION_EXCEPTION: $($_.Exception.Message)"
        Write-Output "STACK: $($_.ScriptStackTrace)"
      }
  register: dcpromo_child
  notify: Reboot Windows
  when:
    - parent_domain_name is defined
    - "'NEEDS_PROMOTION' in child_dc_state.stdout"
