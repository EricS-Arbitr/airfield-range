# Wait for the LOCAL LDAP endpoint on the DC. Previous version waited on
# `{{ domain_name }}` (e.g. `fops.blackstone.mil:389`) which requires DNS
# to resolve the domain's SRV/A records back to this host -- and on a
# freshly-promoted child DC, that resolution isn't reliable until Netlogon
# finishes writing its records, which can race with the wait. Waiting on
# 127.0.0.1:389 directly probes AD services on this box without depending
# on DNS. See UPSTREAM_FIXES.md 2026-07-13.
- name: wait for LDAP (local endpoint)
  ansible.windows.win_wait_for:
    host: 127.0.0.1
    port: 389
    timeout: 600

- name: Check current password complexity setting
  ansible.windows.win_shell: (Get-ADDefaultDomainPasswordPolicy).ComplexityEnabled
  register: current_setting
  changed_when: false

- name: Disable password complexity in domain GPO
  ansible.windows.win_shell: Set-ADDefaultDomainPasswordPolicy -Identity (Get-ADDomain) -ComplexityEnabled $false
  when:
    - current_setting.stdout | regex_search('True') != None


- name: Create Users
  microsoft.ad.user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    password_never_expires: yes
    state: present
  loop: "{{ DomainUsers }}"
  when:
    - DomainUsers is defined

- name: Group Assignment
  microsoft.ad.user:
    name: "{{ item.name }}"
    groups:
      set: "{{ item.groups }}"
    state: present
  loop: "{{ DomainUsers }}"
  when:
    - item.groups is defined

# microsoft.ad.user's `groups: set:` resolved "Domain Admins" against the
# *Builtin* container (CN=Builtin) instead of the global group at
# CN=Domain Admins,CN=Users — net result: simspace landed in
# Builtin\Administrators rather than the global Domain Admins group, and
# `Install-ADDSDomainController` rejected the credential. Belt-and-suspenders
# pass with microsoft.ad.group resolves the group by sAMAccountName explicitly,
# which lands the membership in the right group. See UPSTREAM_FIXES.md 2026-06-26.
- name: Force-add Domain Users to their declared groups (explicit sAMAccountName)
  microsoft.ad.group:
    identity: "{{ item.1 }}"
    members:
      add: ["{{ item.0.name }}"]
  with_subelements:
    - "{{ DomainUsers }}"
    - groups
  when: DomainUsers is defined

# Unconditional belt-and-suspenders: simspace is the lab convention admin
# account (declared in group_vars/all.yml as `domain_admin`). The loop-based
# tasks above can silently skip if a future schema change breaks the loop;
# this one always runs.
- name: Force-add the lab admin user to Domain Admins (no loop)
  microsoft.ad.group:
    identity: "Domain Admins"
    members:
      add: ["{{ domain_admin }}"]
