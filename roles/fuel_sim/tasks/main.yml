---
# fuel_sim — deploys fuelsim (Python systemd service) to fuel-farm-sim.
# Serves the field-bus Modbus slave (pymodbus) that ff-plc-1 (OpenPLC
# master) polls, runs the physics model, drives the logistics state
# machine from the 48h replay timeline, and writes audit rows to
# fuel-db's Postgres.
#
# Build sheet §8. The Python source in files/fuelsim/ is now the real
# implementation (four asyncio-driven modules). The offline dataset
# generator lives at files/generate_timeline.py; the pre-generated
# 48h JSONL at files/fuel_ops_timeline.jsonl (seed 20260101).

# Use whichever python3 the OS ships (jammy: 3.10, noble: 3.12).
# pymodbus 3.6.x supports Python 3.9+ and psycopg2 2.9.x supports 3.7+,
# so both jammy and noble work without a codename-specific pin. If the
# fuelsim modules later need 3.12-only features we can add deadsnakes PPA.
- name: Ensure python3 + venv + build deps
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - build-essential
    state: present
    update_cache: yes

- name: Create fuelsim user + install directory
  ansible.builtin.user:
    name: fuelsim
    system: yes
    shell: /usr/sbin/nologin
    home: /opt/fuelsim
    create_home: yes

- name: Directory layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: fuelsim
    group: fuelsim
    mode: '0755'
  loop:
    - /opt/fuelsim
    - /opt/fuelsim/bin
    - /opt/fuelsim/config
    - /opt/fuelsim/timelines

- name: Create Python venv (uses OS-default python3)
  ansible.builtin.command:
    cmd: python3 -m venv /opt/fuelsim/venv
    creates: /opt/fuelsim/venv/bin/python

- name: Install pymodbus + psycopg2 + PyYAML into venv
  ansible.builtin.pip:
    name:
      - "pymodbus[serial]==3.6.*"
      - "psycopg2-binary==2.9.*"
      - "PyYAML"
    virtualenv: /opt/fuelsim/venv
    state: present

- name: Deploy fuelsim source (modbus + physics + state_machine + replay + entrypoint)
  ansible.builtin.copy:
    src: fuelsim/
    dest: /opt/fuelsim/bin/
    owner: fuelsim
    group: fuelsim
    mode: '0755'
  notify: restart fuelsim

# Ships the offline dataset generator alongside the daemon so operators
# can regenerate the timeline with a different --seed / --hours without
# needing the source repo on the range.
- name: Deploy timeline generator (offline tool)
  ansible.builtin.copy:
    src: generate_timeline.py
    dest: /opt/fuelsim/bin/generate_timeline.py
    owner: fuelsim
    group: fuelsim
    mode: '0755'

- name: Render fuelsim config (host addresses + DB creds + register map + physics)
  ansible.builtin.template:
    src: fuelsim.yml.j2
    dest: /opt/fuelsim/config/fuelsim.yml
    owner: fuelsim
    group: fuelsim
    mode: '0640'
  notify: restart fuelsim

# Pre-generated 48h timeline (seed 20260101). Bit-for-bit reproducible
# via `python3 /opt/fuelsim/bin/generate_timeline.py --seed 20260101
# --hours 48 --output /opt/fuelsim/timelines/fuel_ops_timeline.jsonl`.
- name: Deploy 48h replay timeline (deterministic, seed 20260101)
  ansible.builtin.copy:
    src: fuel_ops_timeline.jsonl
    dest: /opt/fuelsim/timelines/fuel_ops_timeline.jsonl
    owner: fuelsim
    group: fuelsim
    mode: '0644'
  notify: restart fuelsim

- name: Deploy fuelsim systemd unit
  ansible.builtin.template:
    src: fuelsim.service.j2
    dest: /etc/systemd/system/fuelsim.service
    mode: '0644'
  notify:
    - reload systemd
    - restart fuelsim

- name: Enable + start fuelsim
  ansible.builtin.systemd:
    name: fuelsim
    enabled: yes
    state: started
    daemon_reload: yes
