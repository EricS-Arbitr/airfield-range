---
# Local-Administrator-like credential for reaching a half-joined DC candidate.
# Install-ADDSDomain preserves the local simspace user during promotion
# attempts (documented in UPSTREAM_FIXES.md 2026-07-08). Even when it sets
# the Primary DNS Suffix to the child domain — which makes unqualified
# `simspace` NTLM auth reject — the qualified form `.\simspace` still
# succeeds against the local SAM.
# NOTE: NTLM (pywinrm) does NOT accept the `.\user` shorthand -- that's a
# Windows console format, not an NTLM auth format. Must use a real
# machine name qualifier: `MACHINE\user`. We use inventory_hostname
# uppercased because SimSpace's Windows images set Win32_ComputerSystem.Name
# to the inventory hostname in uppercase.
heal_local_user: "{{ inventory_hostname | upper }}\\simspace"
heal_local_password: "{{ ansible_password | default('Simspace1!Simspace1!') }}"

# Credential for the parent-forest cleanup (delegated to pdc_blackstone).
# After Install-ADDSDomain has registered the FOPS crossRef in the
# Configuration NC, only Enterprise Admin can remove it. The built-in
# Administrator on the forest root is auto-EA immediately after
# microsoft.ad.domain (the forest-root dcpromo) finishes; that's the
# credential we use for surgical Remove-ADObject calls.
heal_parent_admin_user: 'Administrator'
heal_parent_admin_password: "{{ domain_admin_password }}"
