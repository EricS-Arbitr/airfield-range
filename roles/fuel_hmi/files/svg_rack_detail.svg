    <rect x="650" y="60" width="610" height="40" fill="#1b3d5c"/>
    <text x="955" y="88" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">LR-2  ·  LOADING RACK 2</text>

    <g id="rack2_truck_info">
