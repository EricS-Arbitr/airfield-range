      <text x="690" y="145" font-size="12" fill="#666">ACTIVE TRUCK</text>
      <g id="VAL_LR2D_ACTIVE_TRUCK" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="28" font-family="Arial" font-weight="bold">
        <text id="VAL_LR2D_ACTIVE_TRUCK_inner" x="690" y="180" font-size="28" font-weight="bold" fill="#1b3d5c" xml:space="preserve">--</text>
      </g>

      <text x="970" y="145" font-size="12" fill="#666">SOURCE TANK</text>
      <g id="VAL_LR2D_SRC_TANK" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="28" font-family="Arial" font-weight="bold">
        <text id="VAL_LR2D_SRC_TANK_inner" x="970" y="180" font-size="28" font-weight="bold" fill="#1b3d5c" xml:space="preserve">--</text>
      </g>
    </g>

    <g id="rack2_batch">
      <rect x="670" y="220" width="570" height="120" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="690" y="245" font-size="12" fill="#666">BATCH PROGRESS</text>

      <text x="690" y="275" font-size="11" fill="#333">Preset:</text>
      <g id="VAL_LR2D_PRESET_GAL" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="14" font-family="Arial" font-weight="bold">
        <text id="VAL_LR2D_PRESET_GAL_inner" x="760" y="275" font-size="14" font-weight="bold" fill="#1b3d5c" xml:space="preserve">-- gal</text>
      </g>

      <text x="950" y="275" font-size="11" fill="#333">Delivered (meter):</text>
      <g id="VAL_LR2D_METER" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="14" font-family="Arial" font-weight="bold">
        <text id="VAL_LR2D_METER_inner" x="1100" y="275" font-size="14" font-weight="bold" fill="#1b3d5c" xml:space="preserve">-- gal</text>
      </g>

      <rect x="690" y="295" width="530" height="30" fill="#e0e0e0" stroke="#333"/>
      <rect id="LR2D_progress_fill" x="690" y="295" width="0" height="30" fill="#4a90d9"/>
      <text x="955" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">0%</text>
    </g>

    <g id="rack2_flow">
      <rect x="670" y="360" width="270" height="100" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="690" y="385" font-size="12" fill="#666">LIVE FLOW</text>
      <g id="VAL_LR2D_FLOW" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="36" font-family="Arial" font-weight="bold">
