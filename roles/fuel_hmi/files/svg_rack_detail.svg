  <g id="nav_bar">
    <rect x="20" y="560" width="1240" height="100" fill="#ffffff" stroke="#c0c0c0"/>
    <rect id="navD_overview_btn" type="svg-ext-shapes-rect" x="40" y="580" width="220" height="60" fill="#7a8fa5" stroke="#000"/>
    <text x="150" y="618" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Process Overview</text>

    <rect id="navD_rack_detail_btn" type="svg-ext-shapes-rect" x="280" y="580" width="220" height="60" fill="#1b3d5c" stroke="#000"/>
    <text x="390" y="618" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Loading Rack Detail</text>

    <text x="1250" y="650" text-anchor="end" font-size="10" fill="#8a8a8a">Airfield Range · Fuel Farm · Ansible-managed</text>
  </g>

  <g id="footer_bar">
    <rect x="0" y="680" width="1280" height="40" fill="#e0e0e0"/>
    <text x="20" y="705" font-size="11" fill="#666">Source: ff-plc-1.blackstone.mil (172.16.45.10)  ·  Modbus TCP :502  ·  Poll 1000 ms</text>
  </g>
