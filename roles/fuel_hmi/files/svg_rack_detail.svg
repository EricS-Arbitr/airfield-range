<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" style="font-family:Arial,sans-serif">
  <rect width="1280" height="720" fill="#f5f5f5"/>

  <g id="header_bar">
    <rect x="0" y="0" width="1280" height="44" fill="#1b3d5c"/>
    <text x="20" y="28" fill="#ffffff" font-size="20" font-weight="bold">AIRFIELD FUEL FARM  ·  LOADING RACK DETAIL</text>
  </g>

  <g id="rack1_panel">
    <rect x="20" y="60" width="610" height="480" fill="#ffffff" stroke="#8a8a8a" stroke-width="1"/>
    <rect x="20" y="60" width="610" height="40" fill="#1b3d5c"/>
    <text x="325" y="88" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">LR-1  ·  LOADING RACK 1</text>

    <g id="rack1_truck_info">
      <rect x="40" y="120" width="570" height="80" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="60" y="145" font-size="12" fill="#666">ACTIVE TRUCK</text>
      <g id="VAL_LR1D_ACTIVE_TRUCK" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="28" font-family="Arial" font-weight="bold">
        <text id="VAL_LR1D_ACTIVE_TRUCK_inner" x="60" y="180" font-size="28" font-weight="bold" fill="#1b3d5c" xml:space="preserve">--</text>
      </g>

      <text x="340" y="145" font-size="12" fill="#666">SOURCE TANK</text>
      <g id="VAL_LR1D_SRC_TANK" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="28" font-family="Arial" font-weight="bold">
        <text id="VAL_LR1D_SRC_TANK_inner" x="340" y="180" font-size="28" font-weight="bold" fill="#1b3d5c" xml:space="preserve">--</text>
      </g>
    </g>

    <g id="rack1_batch">
      <rect x="40" y="220" width="570" height="120" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="60" y="245" font-size="12" fill="#666">BATCH PROGRESS</text>

      <text x="60" y="275" font-size="11" fill="#333">Preset:</text>
      <g id="VAL_LR1D_PRESET_GAL" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="14" font-family="Arial" font-weight="bold">
        <text id="VAL_LR1D_PRESET_GAL_inner" x="130" y="275" font-size="14" font-weight="bold" fill="#1b3d5c" xml:space="preserve">-- gal</text>
      </g>

      <text x="320" y="275" font-size="11" fill="#333">Delivered (meter):</text>
      <g id="VAL_LR1D_METER" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="14" font-family="Arial" font-weight="bold">
        <text id="VAL_LR1D_METER_inner" x="470" y="275" font-size="14" font-weight="bold" fill="#1b3d5c" xml:space="preserve">-- gal</text>
      </g>

      <rect x="60" y="295" width="530" height="30" fill="#e0e0e0" stroke="#333"/>
      <rect id="LR1D_progress_fill" x="60" y="295" width="0" height="30" fill="#4a90d9"/>
      <text x="325" y="316" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">0%</text>
    </g>

    <g id="rack1_flow">
      <rect x="40" y="360" width="270" height="100" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="60" y="385" font-size="12" fill="#666">LIVE FLOW</text>
      <g id="VAL_LR1D_FLOW" type="svg-ext-value" fill="#1b3d5c" stroke="none" font-size="36" font-family="Arial" font-weight="bold">
        <text id="VAL_LR1D_FLOW_inner" x="60" y="435" font-size="36" font-weight="bold" fill="#1b3d5c" xml:space="preserve">--</text>
      </g>
      <text x="270" y="435" font-size="14" fill="#666" text-anchor="end">gpm</text>
    </g>

    <g id="rack1_status">
      <rect x="330" y="360" width="280" height="160" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="350" y="385" font-size="12" fill="#666">STATUS</text>

      <circle id="LR1D_GROUND_OK_dot" type="svg-ext-shapes-circle" cx="360" cy="410" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="378" y="415" font-size="12" fill="#333">Ground OK</text>

      <circle id="LR1D_DEADMAN_dot" type="svg-ext-shapes-circle" cx="360" cy="435" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="378" y="440" font-size="12" fill="#333">Deadman Held</text>

      <circle id="LR1D_OVERFILL_dot" type="svg-ext-shapes-circle" cx="360" cy="460" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="378" y="465" font-size="12" fill="#333">Overfill Trip</text>

      <circle id="LR1D_LOAD_VLV_dot" type="svg-ext-shapes-circle" cx="360" cy="485" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="378" y="490" font-size="12" fill="#333">Load Valve Open</text>

      <circle id="LR1D_ESD_dot" type="svg-ext-shapes-circle" cx="510" cy="410" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="528" y="415" font-size="12" fill="#333">ESD Active</text>
    </g>
  </g>

  <g id="rack2_panel">
