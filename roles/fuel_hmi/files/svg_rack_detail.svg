    </g>

    <g id="rack2_status">
      <rect x="960" y="360" width="280" height="160" fill="#f9f9f9" stroke="#c0c0c0"/>
      <text x="980" y="385" font-size="12" fill="#666">STATUS</text>

      <circle id="LR2D_GROUND_OK_dot" type="svg-ext-shapes-circle" cx="990" cy="410" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="1008" y="415" font-size="12" fill="#333">Ground OK</text>

      <circle id="LR2D_DEADMAN_dot" type="svg-ext-shapes-circle" cx="990" cy="435" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="1008" y="440" font-size="12" fill="#333">Deadman Held</text>

      <circle id="LR2D_OVERFILL_dot" type="svg-ext-shapes-circle" cx="990" cy="460" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="1008" y="465" font-size="12" fill="#333">Overfill Trip</text>

      <circle id="LR2D_LOAD_VLV_dot" type="svg-ext-shapes-circle" cx="990" cy="485" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="1008" y="490" font-size="12" fill="#333">Load Valve Open</text>

      <circle id="LR2D_ESD_dot" type="svg-ext-shapes-circle" cx="1140" cy="410" r="8" fill="#c0c0c0" stroke="#333"/>
      <text x="1158" y="415" font-size="12" fill="#333">ESD Active</text>
    </g>
