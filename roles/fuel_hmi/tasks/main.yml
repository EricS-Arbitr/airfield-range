---
# fuel_hmi -- FUXA on control-room-hmi (shared bridge host with power).
# Modbus TCP client polling ff-plc-1's SCADA-bus image on :502.
# Deployed via the frangoteam/fuxa Docker image (build sheet §5 A).
#
# Screens:
#   * "Process Overview"     v_process_overview  -- landing view
#   * "Loading Rack Detail"  v_rack_detail
# SVG authored in files/svg_*.svg; JSON assembled by fuxa_project.json.j2
# (schema learned from FUXA's own demo project + Modbus device source).
# fuxa_bootstrap.py imports the project via /api/project because FUXA
# doesn't auto-load bind-mounted JSON files on startup.

- name: Install docker + python bindings + requests (for bootstrap)
  ansible.builtin.apt:
    name:
      - docker.io
      - python3-docker
      - python3-requests
    state: present
    update_cache: yes

- name: Ensure docker daemon running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Directory for FUXA persistent state + project + bootstrap script
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/fuxa/appdata
    - /opt/fuxa/projects
    - /opt/fuxa/bin

- name: Render FUXA project (device + tags + views from build sheet §5)
  ansible.builtin.template:
    src: fuxa_project.json.j2
    dest: /opt/fuxa/projects/fuel_farm.json
    mode: '0644'
  register: fuxa_project

- name: Deploy FUXA bootstrap script
  ansible.builtin.copy:
    src: fuxa_bootstrap.py
    dest: /opt/fuxa/bin/fuxa_bootstrap.py
    mode: '0755'

- name: Run FUXA container (Modbus TCP client to SCADA-bus PLC)
  community.docker.docker_container:
    name: fuxa
    image: frangoteam/fuxa:latest
    restart_policy: unless-stopped
    published_ports:
      - "{{ fuel_hmi_ip }}:{{ fuxa_port }}:1881"
    volumes:
      - /opt/fuxa/appdata:/usr/src/app/FUXA/server/_appdata
      - /opt/fuxa/projects:/usr/src/app/FUXA/server/_projects
    state: started
  register: fuxa_container

- name: Wait for FUXA UI :1881
  ansible.builtin.wait_for:
    host: "{{ fuel_hmi_ip }}"
    port: "{{ fuxa_port }}"
    timeout: 60

# frangoteam/fuxa:latest ships without the modbus-serial npm package, so
# even though FUXA's plugin registry lists Modbus (server/runtime/devices/
# modbus/index.js is present in the image), require('modbus-serial') fails
# silently at plugin-instantiation time and the device never connects.
# Install the package into the container's node_modules; it survives
# normal restarts (writable layer) but is re-installed on container
# recreation. Check first for idempotency.
- name: Check if modbus-serial is already installed in FUXA container
  ansible.builtin.command:
    cmd: docker exec fuxa test -d /usr/src/app/FUXA/server/node_modules/modbus-serial
  register: modbus_serial_check
  failed_when: false
  changed_when: false

# Container's default network doesn't inherit the host's HTTP proxy
# env, and OT hosts (including control-room-hmi) can only reach the
# npm registry via the mgmt-plane proxy at 10.255.240.1:3128 -- pass
# --proxy / --https-proxy explicitly so npm hits it from inside the
# container's netns.
- name: Install modbus-serial into FUXA container (npm install via mgmt proxy)
  ansible.builtin.command:
    cmd: >-
      docker exec -w /usr/src/app/FUXA/server fuxa
      npm install modbus-serial --no-audit --no-fund --no-save
      --proxy http://10.255.240.1:3128
      --https-proxy http://10.255.240.1:3128
  when: modbus_serial_check.rc != 0
  register: modbus_serial_install

- name: Restart FUXA container to pick up newly-installed plugin
  community.docker.docker_container:
    name: fuxa
    state: started
    restart: yes
  when: modbus_serial_install is changed

- name: Wait for FUXA UI :1881 (post-restart)
  ansible.builtin.wait_for:
    host: "{{ fuel_hmi_ip }}"
    port: "{{ fuxa_port }}"
    timeout: 60
  when: modbus_serial_install is changed

# fuxa_bootstrap.py is idempotent: it GETs /api/project, checks whether
# our device + both views are already present, and only POSTs if they're
# missing or mismatched. Falls back to auth via /api/signin if the
# unauth GET returns 401.
- name: Bootstrap FUXA project (import via /api/project)
  ansible.builtin.command:
    argv:
      - /opt/fuxa/bin/fuxa_bootstrap.py
      - --host={{ fuel_hmi_ip }}
      - --port={{ fuxa_port }}
      - --user={{ fuxa_admin_user }}
      - --password={{ fuxa_admin_password }}
      - --project-file=/opt/fuxa/projects/fuel_farm.json
      # --force bypasses the shallow "same device name + same view IDs"
      # idempotency check so intra-project schema changes (tag memaddress
      # format, item widget types, SVG content) always propagate. We
      # re-post about ~40 KB of JSON per deploy -- cheap.
      - --force
  register: fuxa_bootstrap_result
  changed_when: "'no change' not in fuxa_bootstrap_result.stdout"
