# Mgmt:    10.255.240.142/20 (position FIRST → eth0)
ansible_host: "10.255.240.142"
network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.142"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — Flight-Ops-Services
    ipv4:
      type: "ethernet"
      address: "172.31.3.32"
      netmask: "255.255.255.0"
      gateway: "172.31.3.1"
    dns:
      - "172.31.3.11"
      - "172.31.3.12"
