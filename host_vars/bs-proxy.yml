---
# host_vars/bs-proxy.yml — Linux (Ubuntu Desktop 22.04)
# Image:   global/RDP_Ubuntu_Desktop_22.04.5:1.1.0
# Mgmt:    10.255.240.181/20 (position FIRST → eth0)
#
# Enterprise-internal HTTP/HTTPS proxy. Runs the `squid` role (from
# PowerPlant/range-development-ansible) and terminates the enterprise
# outbound-proxy path on the production plane (172.31.2.0/24 Services).
# Users' browsers point at bs-proxy.blackstone.mil:3128 for lab-simulated
# internet traffic. Distinct from `inet_proxy_addr` (10.255.240.1:3128)
# which is the SimSpace platform's mgmt-plane egress used by Ansible for
# nexus fetches -- never routed through bs-proxy per the CLAUDE.md
# management-plane contract.
ansible_host: "10.255.240.181"

# Blueprint omits `hostname` for this VM (same pattern as soc-splunk).
# Set it explicitly via the common role.
inventory_hostname_short: "bs-proxy"

network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.181"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — blackstone Services
    ipv4:
      type: "ethernet"
      address: "172.31.2.15"
      netmask: "255.255.255.0"
      gateway: "172.31.2.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"
