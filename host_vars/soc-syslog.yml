---
# host_vars/soc-syslog.yml — Linux (Ubuntu)
# Image:   global/RDP_Ubuntu_Server_24.04:1.1.0
# Mgmt:    10.255.240.167/20 (position FIRST → eth0)
ansible_host: "10.255.240.167"
network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.167"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — SOC
    ipv4:
      type: "ethernet"
      address: "172.31.7.13"
      netmask: "255.255.255.0"
      gateway: "172.31.7.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"

# pfSense's syslogd forwards remote messages without a HOSTNAME field, so
# rsyslog falls back to source IP. Map each pfSense firewall's outbound
# source IP (the interface IP it uses on the route to soc-syslog 172.31.7.13)
# to its hostname so logs land in /var/log/remote/<hostname>/ like everyone
# else. Each pfSense routes to 172.31.7.13 deterministically:
#   bs-edge-fw: via core-rtr → sources from vmx1 = 172.31.1.5  (transit /30 .4/30)
#   bs-ops-fw:  via sec-rtr  → sources from vmx3 = 172.31.1.21 (transit /30 .20/30)
# Add more entries here if more pfSense firewalls or hostname-less sources
# join the topology. VyOS routers send their hostname correctly and don't
# need entries here.
syslog_source_ip_map:
  - { ip: "172.31.1.5",  name: "bs-edge-fw" }
  - { ip: "172.31.1.21", name: "bs-ops-fw" }
