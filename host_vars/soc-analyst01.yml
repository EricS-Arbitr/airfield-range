---
# host_vars/soc-analyst01.yml — Windows
# Image:   global/RDP_Windows_11:1.1.2
# Prod:    SOC 172.31.7.31/24 → gw 172.31.7.1
# Mgmt:    10.255.240.124/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.124"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.124"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — SOC
    ipv4:
      address: "172.31.7.31"
      netmask: "255.255.255.0"
      gateway: "172.31.7.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"

# --- Auto-login (autologin role, aue play) ------------------
# Per-host notional occupant, drawn from group_vars/*.yml DomainUsers.
# Password comes from logon_user_password in group_vars/all.yml.
logon_user: "john.jackson"
