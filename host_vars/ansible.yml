---
# host_vars/ansible.yml — Ansible control node
# Image:   global/RC_NG_Ansible:2.0.4
# Mgmt:    10.255.240.157/20 (position FIRST → Ethernet0)
# Prod:    control-10 10.10.10.10/16 (SimSpace control-plane sim)
#
# This is the host Ansible RUNS ON, not a target for plays. host_vars is
# informational; the network_interfaces block matches the PowerPlant
# `ansible.yml` convention for reference.
ansible_host: "10.255.240.157"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.157"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # control-10
    ipv4:
      address: "10.10.10.10"
      netmask: "255.255.0.0"
      gateway: ""
    dns:
      - "172.31.2.7"
