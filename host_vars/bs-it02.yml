---
# host_vars/bs-it02.yml — Windows
# Image:   global/RC_NG_Windows_11:1.0.0
# Prod:    IT 172.31.15.12/24 → gw 172.31.15.1
# Mgmt:    10.255.240.128/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.128"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.128"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — IT
    ipv4:
      address: "172.31.15.12"
      netmask: "255.255.255.0"
      gateway: "172.31.15.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"

# --- Auto-login (autologin role, aue play) ------------------
# Per-host notional occupant, drawn from group_vars/*.yml DomainUsers.
# Password comes from logon_user_password in group_vars/all.yml.
logon_user: "dale.hays"
