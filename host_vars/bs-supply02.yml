---
# host_vars/bs-supply02.yml — Windows
# Image:   global/RDP_Windows_10:1.1.2
# Prod:    Supply 172.31.16.12/24 → gw 172.31.16.1
# Mgmt:    10.255.240.179/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.179"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.179"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — Supply
    ipv4:
      address: "172.31.16.12"
      netmask: "255.255.255.0"
      gateway: "172.31.16.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"
