---
# host_vars/soc-elastic.yml — Linux (Ubuntu)
# Image:   global/RDP_Ubuntu_Server_24.04:1.1.0
# Mgmt:    10.255.240.131/20 (position FIRST → eth0)
ansible_host: "10.255.240.131"
network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.131"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — SOC
    ipv4:
      type: "ethernet"
      address: "172.31.7.15"
      netmask: "255.255.255.0"
      gateway: "172.31.7.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"
