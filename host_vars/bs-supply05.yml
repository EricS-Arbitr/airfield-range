---
# host_vars/bs-supply05.yml — Windows
# Image:   global/RDP_Windows_10:1.1.2
# Prod:    Supply 172.31.16.15/24 → gw 172.31.16.1
# Mgmt:    10.255.240.107/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.107"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.107"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — Supply
    ipv4:
      address: "172.31.16.15"
      netmask: "255.255.255.0"
      gateway: "172.31.16.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"

# --- Auto-login (autologin role, aue play) ------------------
# Per-host notional occupant, drawn from group_vars/*.yml DomainUsers.
# Password comes from logon_user_password in group_vars/all.yml.
logon_user: "james.moore"
