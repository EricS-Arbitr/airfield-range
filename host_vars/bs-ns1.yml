---
# host_vars/bs-ns1.yml — Linux (Ubuntu)
# Image:   global/RDP_Ubuntu_Server_24.04:1.1.0
# Mgmt:    10.255.240.164/20 (position FIRST → eth0)
ansible_host: "10.255.240.164"
network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.164"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — DMZ
    ipv4:
      type: "ethernet"
      address: "172.31.12.5"
      netmask: "255.255.255.0"
      gateway: "172.31.12.1"
    dns:
      - "127.0.0.1"
      - "8.8.8.8"
