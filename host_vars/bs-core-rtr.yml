---
# host_vars/bs-core-rtr.yml — VyOS router
# Image:   RC-VyOS-Router:1.1.0
# Mgmt:    10.255.240.165/20 (position LAST → eth6; managed by SimSpace,
#          not by the vyos role; ansible_host resolves over it)
ansible_host: "10.255.240.165"

network_interfaces:
  - name: "eth0"                     # switch-1 [BGPPEER]
    ipv4:
      address: "172.31.1.6"
      netmask: "255.255.255.252"
      type: "ethernet"
  - name: "eth1"                     # Services [GATEWAY]
    ipv4:
      address: "172.31.2.1"
      netmask: "255.255.255.0"
      type: "ethernet"
  - name: "eth2"                     # Headquarters [GATEWAY]
    ipv4:
      address: "172.31.14.1"
      netmask: "255.255.255.0"
      type: "ethernet"
  - name: "eth3"                     # IT [GATEWAY]
    ipv4:
      address: "172.31.15.1"
      netmask: "255.255.255.0"
      type: "ethernet"
  - name: "eth4"                     # Supply [GATEWAY]
    ipv4:
      address: "172.31.16.1"
      netmask: "255.255.255.0"
      type: "ethernet"
  - name: "eth5"                     # switch-2 [BGPPEER]
    ipv4:
      address: "172.31.1.9"
      netmask: "255.255.255.252"
      type: "ethernet"

# Routing protocol (BGP / OSPF / static) — populate when site.yml's
# network play wires the IGP/eBGP intent. See group_vars/net.yml.
