---
# host_vars/fops-flight03.yml — Windows
# Image:   global/RDP_Windows_10:1.1.2
# Prod:    Flight-Control-Center 172.31.5.83/24 → gw 172.31.5.1
# Mgmt:    10.255.240.151/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.151"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.151"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — Flight-Control-Center
    ipv4:
      address: "172.31.5.83"
      netmask: "255.255.255.0"
      gateway: "172.31.5.1"
    dns:
      - "172.31.3.11"
      - "172.31.3.12"

# --- Auto-login (autologin role, aue play) ------------------
# Per-host notional occupant, drawn from group_vars/*.yml DomainUsers.
# Password comes from logon_user_password in group_vars/all.yml.
logon_user: "ola.burch"
