    ipv4:
      type: "ethernet"
      address: "10.255.240.114"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — SOC
    ipv4:
      type: "ethernet"
      address: "172.31.7.16"
      netmask: "255.255.255.0"
      gateway: "172.31.7.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"
