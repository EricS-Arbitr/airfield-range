---
# host_vars/atc-radar.yml — Linux (Ubuntu)
# Image:   global/RDP_Ubuntu_Server_22.04.5:1.1.0
# Mgmt:    10.255.240.145/20 (position FIRST → eth0)
ansible_host: "10.255.240.145"
network_interfaces:
  - name: "eth0"                     # mgmt (position FIRST)
    ipv4:
      type: "ethernet"
      address: "10.255.240.145"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "eth1"                     # production — Flight-Control-Center
    ipv4:
      type: "ethernet"
      address: "172.31.5.10"
      netmask: "255.255.255.0"
      gateway: "172.31.5.1"
    dns:
      - "172.31.3.11"
      - "172.31.3.12"
