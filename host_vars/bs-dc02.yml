# Prod:    Services 172.31.2.8/24 → gw 172.31.2.1
# Mgmt:    10.255.240.178/20 (position FIRST → Ethernet0)
ansible_host: "10.255.240.178"
network_interfaces:
  - name: "Ethernet0"               # mgmt (position FIRST)
    ipv4:
      address: "10.255.240.178"
      netmask: "255.255.240.0"
      gateway: ""
  - name: "Ethernet1"               # production — Services
    ipv4:
      address: "172.31.2.8"
      netmask: "255.255.255.0"
      gateway: "172.31.2.1"
    dns:
      - "172.31.2.7"
      - "172.31.2.8"
