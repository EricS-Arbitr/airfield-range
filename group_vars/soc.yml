---
# ============================================================
# soc.yml — SOC enclave (172.31.7.0/24)
# ============================================================
# Domain membership TBD (CLAUDE.md §4 — best-judgment vcab.lan).
# Hosts split into:
#   [soc_analysts]  — Win11 analyst workstations
#   [soc_servers]   — soc-syslog, soc-splunk, soc-elastic
#   [soc_tools]     — soc-flare (FLARE-VM), soc-sift (SIFT), soc-openvas
#                     — specialized images; NOT in [windows]/[linux] OS
#                     baseline groups; do not run the common role on them.
# ============================================================

# --- Syslog collector (rsyslog UDP+TCP 514) -----------------
soc_syslog_ip: "172.31.7.13"

# --- SIEM hosts ---------------------------------------------
# soc-splunk runs Splunk Enterprise Core (active SIEM as of blueprint 012).
# soc-elastic reserved for future Elastic / Security Onion stack.
soc_splunk_ip:  "172.31.7.19"
soc_elastic_ip: "172.31.7.15"

# --- Hunt/forensic tooling (informational) ------------------
soc_flare_ip:   "172.31.7.18"     # FLARE-VM malware analysis
soc_sift_ip:    "172.31.7.17"     # SIFT forensic workstation
soc_openvas_ip: "172.31.7.16"     # vuln scanner

# --- WEC subscription targets (Windows Event Collection) ----
# bs-wec / fops-wec01 collect domain-side events; both forward into the SIEM.
wec_collector_vcab_ip:      "{{ wec_vcab_ip }}"
wec_collector_flightops_ip: "{{ wec_flightops_ip }}"
