---
# ============================================================
# blackstone.yml — blackstone.mil domain (forest root) configuration
# ============================================================
# Applies to: [blackstone] (workstations + services) + any other hosts
# later explicitly joined to blackstone.mil (Engineering / SOC per
# CLAUDE.md §4).
#
# Blackstone Auxiliary Field runs a SINGLE AD forest with:
#   - blackstone.mil        (forest root -- this file)
#   - fops.blackstone.mil   (child domain -- group_vars/fops.yml)
# Parent/child trust is automatic and bidirectional; no manual cross-forest
# trust setup. Users in either domain can authenticate to resources in
# either domain by default.
# ============================================================
domain_name: "blackstone.mil"
short_domain_name: "blackstone"
domain_tld_name: "mil"

# --- Domain controllers (PDC emulator listed first) ----------
domain_controllers_blackstone:
  - { name: "bs-dc01", ip: "172.31.2.7" }    # PDC emulator (forest root)
  - { name: "bs-dc02", ip: "172.31.2.8" }

# --- File share ----------------------------------------------
file_server_alias: "file"
file_server_ip: "172.31.2.10"                # bs-file01
share_name: "Share"
share_path: "C:\\Shares\\Share"
map_drive_letter: "S"
map_drive_path: "\\\\bs-file01.blackstone.mil\\Share"

# --- DNS records (skeleton; expand as services come online) ---
internal_dns_records:
  - { name: "file",     type: "A", value: "172.31.2.10", zone: "{{ domain_name }}" }
  - { name: "file01",   type: "A", value: "172.31.2.10", zone: "{{ domain_name }}" }
  - { name: "file02",   type: "A", value: "172.31.2.11", zone: "{{ domain_name }}" }
  - { name: "wec",      type: "A", value: "172.31.2.17", zone: "{{ domain_name }}" }
  - { name: "ntp",      type: "A", value: "172.31.2.6",  zone: "{{ domain_name }}" }  # bs-ntp (pending)
  - { name: "proxy",    type: "A", value: "172.31.2.15", zone: "{{ domain_name }}" }  # bs-proxy (squid)
  # DMZ services advertised inward via internal DNS:
  - { name: "www",      type: "A", value: "172.31.12.3", zone: "{{ domain_name }}" }
  - { name: "ftp",      type: "A", value: "172.31.12.2", zone: "{{ domain_name }}" }
  - { name: "ns1",      type: "A", value: "172.31.12.5", zone: "{{ domain_name }}" }

# --- Domain users (one per workstation, matches PowerPlant pattern) ----
# Each named user is the notional "primary occupant" of a single Windows
# workstation -- so the workstation count drives the user count. Following
# PowerPlant's lab-aggressive posture every named user is in Domain Admins;
# tighten later if a scenario calls for least-privilege. Password is shared
# across all accounts (mirrors PowerPlant's "Simspace1!Simspace1!" via the
# group_vars/all.yml `domain_admin_password` variable).
#
# Names are drawn from PowerPlant/ss-pp-ab/group_vars/voltgrid.yml so
# trainees who run multiple ranges see familiar accounts. Workstation
# assignments live in the trailing comment so a future AUE / auto-logon
# role can consume an explicit mapping if needed.
DomainUsers:
  - name: "simspace"
    fullname: "SimSpace Admin"
    password: "{{ domain_admin_password }}"
    groups: [ "Domain Admins" ]

