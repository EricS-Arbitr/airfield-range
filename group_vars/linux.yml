---
# ============================================================
# linux.yml — SSH connection settings + Linux-wide installers
# ============================================================
ansible_connection: ssh
ansible_user: simspace
ansible_ssh_pass: simspace1
ansible_become_method: sudo
ansible_become_pass: simspace1
ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

staging_dir_linux: "/var/tmp"
cert_dir_linux: "/usr/local/share/ca-certificates"
ansible_installers: "/var/share/installers/"

# --- Splunk (indexer + universal forwarder) ------------------
# Indexer package, license, and the Linux universal forwarder all live on
# the customer's Nexus. The base splunk role first tries get_url against
# `splunk_server_installer` then falls back to the pre-staged copy under
# `{{ ansible_installers }}/splunk/splunk.deb` — keep both paths in sync.
splunk_server_installer: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/Splunk/server/splunk.deb"
splunk_license: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/licenses/splunk/splunk.license"
splunk_forwarder_installer_deb: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/Splunk/Forwarder/9.4.1/splunkfwd.deb"

# --- Range agent bootstrap (common role) ---------------------
range_agent_bootstrap: range-agent-bootstrap_linux_amd64.deb
range_agent_bootstrap_installer: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/range-agent-bootstrap/{{ range_agent_bootstrap }}"

# --- Wazuh agent (Linux) -------------------------------------
wazuh_agent_installer: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/wazuh/wazuh-agent_amd64.deb"

# --- EDR (use whichever the customer selects per host) -------
cs_linux_installer: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/Crowdstrike/UbuntuSensor.deb"
s1_linux_installer: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/installers/sentinelone/SentinelAgent.deb"
