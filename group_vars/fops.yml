---
# ============================================================
# fops.yml — fops.blackstone.mil child-domain configuration
# ============================================================
# Applies to: [fops] (workstations + services). Child domain of the
# blackstone.mil forest root -- see group_vars/blackstone.yml. Parent/child
# trust is automatic and bidirectional in a single AD forest; there is NO
# manual cross-forest trust setup (removed in the blackstone rebrand --
# the earlier vcab.lan / fops.blackstone.mil two-forest design used an
# explicit external trust, which is unnecessary in a single-forest
# parent/child arrangement).
# ============================================================
domain_name: "fops.blackstone.mil"
short_domain_name: "fops"
# Parent domain (needed by dcpromo to create the child domain via
# Install-ADDSDomain -DomainType ChildDomain -ParentDomainName ...).
parent_domain_name: "blackstone.mil"

# --- Domain controllers (PDC emulator listed first) ----------
domain_controllers_fops:
  - { name: "fops-dc01", ip: "172.31.3.11" }    # PDC emulator for fops.blackstone.mil
  - { name: "fops-dc02", ip: "172.31.3.12" }

# --- File share ----------------------------------------------
file_server_alias: "fops-file"
file_server_ip: "172.31.3.15"                   # fops-file01
share_name: "Share"
share_path: "C:\\Shares\\Share"
map_drive_letter: "F"
map_drive_path: "\\\\fops-file01.fops.blackstone.mil\\Share"

# --- DNS records (skeleton) ---------------------------------
internal_dns_records:
  - { name: "fops-file",  type: "A", value: "172.31.3.15", zone: "{{ domain_name }}" }
  - { name: "fops-file01", type: "A", value: "172.31.3.15", zone: "{{ domain_name }}" }
  - { name: "fops-file02", type: "A", value: "172.31.3.16", zone: "{{ domain_name }}" }
  - { name: "fops-wec",    type: "A", value: "172.31.3.20", zone: "{{ domain_name }}" }
  # ATC + weather services
  - { name: "atc-radar",   type: "A", value: "172.31.5.10", zone: "{{ domain_name }}" }
  - { name: "atc-weather", type: "A", value: "172.31.5.11", zone: "{{ domain_name }}" }
  - { name: "atc-station", type: "A", value: "172.31.5.12", zone: "{{ domain_name }}" }
  # App tier
  - { name: "fops-app01",  type: "A", value: "172.31.3.30", zone: "{{ domain_name }}" }
  - { name: "fops-app02",  type: "A", value: "172.31.3.31", zone: "{{ domain_name }}" }
  - { name: "fops-app03",  type: "A", value: "172.31.3.32", zone: "{{ domain_name }}" }

# --- Domain users (one per workstation, matches PowerPlant pattern) ----
# See group_vars/blackstone.yml for the convention rationale: one user per
# workstation, all in Domain Admins (PowerPlant lab posture), shared
# password via `domain_admin_password`. PowerPlant's roster supplies the
# first 7 here; the last 5 (amir.patel ... emma.rodriguez) are new to
# blackstone-range because fops has 12 workstations and we exhausted the
# PowerPlant list after 33 names (26 spent on blackstone).
DomainUsers:
  - name: "simspace"
    fullname: "SimSpace Admin"
    password: "{{ domain_admin_password }}"
    groups: [ "Domain Admins" ]

  # --- Flight Control Center (fops-flight01..04) ----------
  - { name: "marcos.casey",        fullname: "Marcos Casey",        password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-flight01
  - { name: "michelle.blanchard",  fullname: "Michelle Blanchard",  password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-flight02
  - { name: "ola.burch",           fullname: "Ola Burch",           password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-flight03
  - { name: "rosemary.cortez",     fullname: "Rosemary Cortez",     password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-flight04

  # --- Flight Operations Users (fops-ops01..08) ----------
  - { name: "roxanne.farley",      fullname: "Roxanne Farley",      password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops01
  - { name: "sean.wilkinson",      fullname: "Sean Wilkinson",      password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops02
  - { name: "tessa.church",        fullname: "Tessa Church",        password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops03
  - { name: "amir.patel",          fullname: "Amir Patel",          password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops04 (new -- not in PowerPlant roster)
  - { name: "bianca.olson",        fullname: "Bianca Olson",        password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops05 (new)
  - { name: "chloe.nguyen",        fullname: "Chloe Nguyen",        password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops06 (new)
  - { name: "darius.washington",   fullname: "Darius Washington",   password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops07 (new)
  - { name: "emma.rodriguez",      fullname: "Emma Rodriguez",      password: "{{ domain_admin_password }}", groups: ["Domain Admins"] }  # fops-ops08 (new)
