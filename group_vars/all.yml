---
# ============================================================
# all.yml — shared across the entire airfield-range
# ============================================================
# Anything that varies per-host lives in host_vars/.
# Anything that varies per-enclave/role lives in the matching
# group_vars/<group>.yml.
# ============================================================

# --- Domain admin (mirrors customer-base convention) ---------
domain_admin: "simspace"
domain_admin_password: "Simspace1!Simspace1!"

# --- Auto-login (shared password across every workstation) ---
# Per-host `logon_user` in host_vars maps each workstation to its notional
# occupant from DomainUsers (see group_vars/{blackstone,fops}.yml). The
# `autologin` role uses these to seed HKLM\...\Winlogon Default* keys so
# analysts opening an RDP session don't get a login prompt.
logon_user_password: "{{ domain_admin_password }}"

# --- Enterprise squid proxy ----------------------------------
# bs-proxy runs squid on 172.31.2.15:3128 (Services subnet, blackstone.mil).
# Referenced by the customer `squid` role's proxy.conf.j2 for downstream
# hosts that want an in-scenario HTTP/HTTPS proxy. Distinct from
# inet_proxy_addr (10.255.240.1:3128 -- SimSpace mgmt-plane egress used
# only by Ansible/apt for nexus fetches, per CLAUDE.md §8).
proxy_server: "172.31.2.15"

# --- Certs (customer Nexus) ----------------------------------
cs_certs:
  - "https://nexus.dev.ng.simspace.lan/repository/ng_raw/certificates/DigiCertHighAssuranceEVRootCA.crt"
  - "https://nexus.dev.ng.simspace.lan/repository/ng_raw/certificates/DigiCertGlobalRootG2.crt"
  - "https://nexus.dev.ng.simspace.lan/repository/ng_raw/certificates/DigiCertAssuredIDRootCA.crt"
ms_cert: "https://nexus.dev.ng.simspace.lan/repository/ng_raw/certificates/MicrosoftIdentityVerificationRootCert2020.crt"

# --- Upstream proxy ------------------------------------------
# The mgmt gateway (10.255.240.1) is the platform's egress proxy.
inet_proxy_addr: "10.255.240.1"
inet_proxy_port: "3128"

# --- Global DNS simulator ------------------------------------
# is-inet runs an unbound container that resolves any name in this list
# to a lab-simulated public IP. Extend as scenarios need new public-facing
# names (military domains, weather services, adversary infrastructure).
# Consumed by the `global_dns` role's simspace_includes.conf.j2 template.
global_dns_container_name: "is-inet"
global_dns_records:
  # Aviation / DoD scenario domains (subset — expand as exercises call for)
  - { name: "www",       type: "A", value: "70.39.65.10",  zone: "faa.gov" }
  - { name: "www",       type: "A", value: "70.39.65.11",  zone: "weather.gov" }
  - { name: "www",       type: "A", value: "70.39.65.12",  zone: "aviationweather.gov" }
  - { name: "www",       type: "A", value: "70.39.65.13",  zone: "airnav.com" }
  - { name: "www",       type: "A", value: "70.39.65.14",  zone: "arbitrsecurity.com" }
  # Commodity internet (browser default homepages, package repos)
  - { name: "www",       type: "A", value: "70.39.65.194", zone: "google.com" }
  - { name: "www",       type: "A", value: "70.39.65.195", zone: "microsoft.com" }
  - { name: "www",       type: "A", value: "70.39.65.196", zone: "github.com" }
  # Mail domains (Exchange/Outlook simulation)
  - { name: "mail",      type: "A", value: "52.96.223.2",  zone: "outlook.com" }
  - { type: "MX", priority: 10, value: "mail.outlook.com", zone: "outlook.com" }

# --- Time discipline (CLAUDE.md §3 — NTP server in-range) ----
# bs-ntp is not yet in the blueprint; once added, every host's
# chrony.conf / w32time points at this IP. PDC-emulator on each
# domain syncs to bs-ntp and is authoritative for its domain.
ntp_server_ip: "172.31.2.6"        # planned bs-ntp (Services /24)
ntp_server_hostname: "bs-ntp.blackstone.mil"

# --- Central syslog collector --------------------------------
# soc-syslog runs rsyslog (UDP+TCP 514) and forwards to the SIEM.
syslog_server_ip: "172.31.7.13"    # soc-syslog (SOC /24)

# --- SIEM stack (Splunk active; Elastic reserved for later) -----------------
# Splunk Enterprise Core runs on soc-splunk (new host as of blueprint
# ARBITR_MB_012). Universal forwarders on every Linux/Windows managed host
# point at splunk_server_ip:splunk_forwarder_port. `elastic_server_ip` is
# reserved for the future Elastic / Security Onion stack on soc-elastic;
# soc-elastic intentionally gets NO splunk-forwarder so it stays a clean
# canvas for that work.
splunk_server_ip: "172.31.7.19"         # soc-splunk (SOC /24)
splunk_forwarder_port: "9997"
elastic_server_ip: "172.31.7.15"        # soc-elastic — reserved; no role yet

# Splunk admin credentials. Matches PowerPlant convention (`simspace1`).
# Used by base splunk role for initial admin seed + REST API auth, and by
# splunk-forwarder for outputs.conf indexer auth. Rotate before any
# real-adversary scenario.
splunk_admin: "admin"
splunk_admin_password: "simspace1"
splunk_user: "{{ splunk_admin }}"        # forwarder reuses admin creds
splunk_password: "{{ splunk_admin_password }}"

# Splunk indices created by the base splunk role on soc-splunk. Grouped by
# CIM data model / log volume. Forwarder templates route events into these.
# Sysmon is split out from generic windows to ease volume-based retention
# tuning later; netfw covers pfSense + VyOS syslog forwarded via soc-syslog.
indices:
  - name: "windows"     # AD events, security/system/application + Sysmon for now
  - name: "sysmon"      # reserved for future Sysmon split
  - name: "linux"       # Linux syslog (Ubuntu hosts)
  - name: "netfw"       # pfSense + VyOS syslog (relayed by soc-syslog UF)
  - name: "ot"          # OT historian + audit DB events (when fuel/power tiers land)
  - name: "wec"         # Windows Event Collector subscriptions (blackstone + fops)

# --- WEC collectors (Windows Event Collectors) ---------------
# Two: one per domain. Domain members forward to their domain's WEC.
wec_blackstone_ip: "172.31.2.17"         # bs-wec (Services)
wec_fops_ip: "172.31.3.20"    # fops-wec01 (Flight-Ops-Services)

# --- Wazuh manager (DEFERRED — SIEM tier on Splunk for now) --
# `wazuh_manager_ip` and the wazuh_agent_installer URLs in linux.yml /
# windows.yml are dangling references from an earlier draft. Kept so any
# accidental var resolutions don't fail; safe to delete once a future
# cleanup confirms nothing consumes them. See project memory `siem-choice`.
wazuh_manager_ip: "{{ splunk_server_ip }}"
