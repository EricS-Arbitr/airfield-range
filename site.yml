---
# airfield-range site.yml
#
# Play order is deliberate: management-plane plays (Init, adapter/NM
# pre-config, common baseline, GNOME suppression) run FIRST while the data
# plane is still un-routed. Ansible reaches every host on the mgmt subnet
# (10.255.240.0/20), which is L2-flat and does not depend on VyOS/pfSense
# state, so these plays succeed even before the network play runs.
#
# Network plays (VyOS, pfSense) then bring the data plane up so the
# foundation tier (NTP, AD, DNS, DHCP) and everything downstream can land.
#
# Deviates from CLAUDE.md §10's documented network-first order by design.

- name: Init
  hosts: windows
  gather_facts: false
  any_errors_fatal: true
  roles:
    - init
  tags:
    - init

- name: Windows adapter rename pre-config
  hosts: windows
  gather_facts: false
  tasks:
    - name: Rename Windows adapters to canonical Ethernet0/EthernetN by ifIndex order
      ansible.windows.win_powershell:
        script: |
          $adapters = @(Get-NetAdapter | Sort-Object ifIndex)
          $names = @($adapters | ForEach-Object { $_.Name })
          $count = $adapters.Count

          # If all expected canonical names already exist among the adapters,
          # the image's naming is correct — leave it alone. Doing otherwise
          # risks swapping the mgmt/data-plane mapping when ifIndex ordering
          # doesn't match the image's existing Name ordering (which it often
          # doesn't on SimSpace Windows 10/11 images).
          $allCanonical = $true
          for ($i = 0; $i -lt $count; $i++) {
            if ($names -notcontains "Ethernet$i") { $allCanonical = $false; break }
          }
          if ($allCanonical) {
            $Ansible.Changed = $false
            Write-Output "All adapter names already canonical; no rename."
            return
          }

          # Non-canonical naming (e.g. Server 2019 image ships with
          # "Ethernet"/"Ethernet 2"). Rename via a temp-name pass first so
          # the final names can't collide with existing names mid-loop.
          $tempPrefix = "_ppRename_"
          $tempIdx = 0
          foreach ($a in $adapters) {
            Rename-NetAdapter -Name $a.Name -NewName "$tempPrefix$tempIdx" -ErrorAction Stop
            $tempIdx++
          }
          $renamed = @()
          $idx = 0
          foreach ($a in $adapters) {
            $target = "Ethernet$idx"
            Rename-NetAdapter -Name "$tempPrefix$idx" -NewName $target -ErrorAction Stop
            $renamed += "$($a.Name) -> $target"
            $idx++
          }
          $Ansible.Changed = $true
          Write-Output ($renamed -join '; ')
  tags:
    - common
    - win_adapter_rename

- name: Linux NM managed-devices pre-config
  hosts: linux
  gather_facts: false
  become: true
  tasks:
    # apt needs the corp proxy reachable before any Ubuntu archive call.
    # `common` drops this same file later but runs in a later play; do it
    # here too so this play's `apt install network-manager` can reach Nexus.
    - name: Set apt proxy from group_vars/all.yml
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/95-airfield-proxy
        content: |
          Acquire::http::Proxy "http://{{ inet_proxy_addr }}:{{ inet_proxy_port }}";
          Acquire::https::Proxy "http://{{ inet_proxy_addr }}:{{ inet_proxy_port }}";
        owner: root
        group: root
        mode: '0644'

    - name: Ensure NetworkManager is installed
      ansible.builtin.apt:
        name: network-manager
        state: present

    - name: Opt eth* devices into NetworkManager management
      ansible.builtin.copy:
        dest: /etc/NetworkManager/conf.d/99-airfield-eth-managed.conf
        content: |
          [keyfile]
          unmanaged-devices=

          [device-eth-managed]
          match-device=interface-name:eth*
          managed=true
        owner: root
        group: root
        mode: '0644'
      register: nm_managed_conf

    - name: Restart NetworkManager if config changed
      ansible.builtin.systemd:
        name: NetworkManager
        state: restarted
        enabled: true
      when: nm_managed_conf.changed

    - name: Wait for NetworkManager to settle after restart
      ansible.builtin.pause:
        seconds: 3
      when: nm_managed_conf.changed

    # Drive the loop from facts so multi-NIC OT bridges (e.g. control-room-hmi
    # with eth0/eth1/eth2) get every eth managed, not just eth0/eth1.
    - name: Gather network facts for eth* enumeration
      ansible.builtin.setup:
        gather_subset: network

    - name: Force every eth device into managed state at runtime
      ansible.builtin.shell: |
        nmcli device set "{{ item }}" managed yes
      loop: "{{ ansible_interfaces | select('match', '^eth[0-9]+$') | list }}"
      register: nmcli_set_managed
      changed_when: "'successfully' in (nmcli_set_managed.stdout | default(''))"
      failed_when: false
  tags:
    - common
    - nm_managed_eth

- name: Common Role
  hosts: windows,linux
  gather_facts: true
  roles:
    - common
  tags:
    - common

# The Ubuntu Desktop images ship with gnome-initial-setup enabled, which
# pops the "Connect Your Online Accounts" / Welcome wizard the first time
# anyone logs into the GUI. Drop the documented "wizard already seen" flag
# file under each existing user's ~/.config and in /etc/skel so future
# users inherit it. gnome-initial-setup checks for this file and exits
# silently when it contains "yes".
- name: Suppress GNOME initial-setup wizard on Linux desktops
  hosts: linux
  gather_facts: false
  become: true
  tasks:
    - name: Find user home directories under /home
      ansible.builtin.find:
        paths: /home
        file_type: directory
        depth: 1
      register: gnome_user_homes

    - name: Ensure ~/.config exists for each user
      ansible.builtin.file:
        path: "{{ item.path }}/.config"
        state: directory
        owner: "{{ item.pw_name }}"
        group: "{{ item.gr_name }}"
        mode: '0755'
      loop: "{{ gnome_user_homes.files }}"

    - name: Mark GNOME initial-setup done for each existing user
      ansible.builtin.copy:
        dest: "{{ item.path }}/.config/gnome-initial-setup-done"
        content: "yes\n"
        owner: "{{ item.pw_name }}"
        group: "{{ item.gr_name }}"
        mode: '0644'
      loop: "{{ gnome_user_homes.files }}"

    - name: Ensure /etc/skel/.config exists for future users
      ansible.builtin.file:
        path: /etc/skel/.config
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Mark GNOME initial-setup done in /etc/skel
      ansible.builtin.copy:
        dest: /etc/skel/.config/gnome-initial-setup-done
        content: "yes\n"
        owner: root
        group: root
        mode: '0644'
  tags:
    - common
    - gnome_initial_setup

- name: Vyos Role
  hosts: vyos
  gather_facts: false
  roles:
    - vyos
  tags:
    - vyos

# The customer's vyos role's `static_route` field is a single dict, not a
# list. Hosts that need more than one static (e.g. an OT umbrella back-stop
# alongside the default) declare them in host_vars as
# `extra_static_routes: [{network, next_hop, descr}]`. This play pushes them
# via vyos_config; the role's auto `redistribute static` picks them up.
- name: Additional VyOS static routes
  hosts: vyos
  gather_facts: false
  tasks:
    - name: Push extra static routes via vyos_config
      vyos.vyos.vyos_config:
        match: line
        lines:
          - "set protocols static route {{ item.network }} next-hop {{ item.next_hop }}"
        save: true
      loop: "{{ extra_static_routes | default([]) }}"
      when: extra_static_routes is defined and (extra_static_routes | length) > 0
  tags:
    - vyos
    - extra_static_routes

# The SimSpace VyOS image bakes a stale `0.0.0.0/0 next-hop <X>` entry
# for every /24 "departmental" interface IP on the box. On routers with
# multiple such interfaces (bs-core-rtr, bs-ops-rtr, bs-sec-rtr, etc.) this
# creates competing equal-cost defaults whose next-hops resolve to the
# router's OWN connected IPs. FRR refuses to install a default whose
# next-hop is a local interface and ECMPs the whole route out of the FIB —
# leaving the router with no default at all. Symptom: `show ip route` has
# no `S>* 0.0.0.0/0` line; downstream subnets see "destination unreachable".
#
# Each affected host declares `extra_static_routes_remove: [{network,
# next_hop}]` in host_vars. This play issues the matching `delete` so the
# only default left is the one the customer `vyos` role just set from
# `static_route`. Log all new self-loop discoveries in UPSTREAM_FIXES.md.
- name: Remove stale VyOS static routes (image-baked self-loop defaults)
  hosts: vyos
  gather_facts: false
  tasks:
    - name: Delete stale static routes via vyos_config
      vyos.vyos.vyos_config:
        match: line
        lines:
          - "delete protocols static route {{ item.network }} next-hop {{ item.next_hop }}"
        save: true
      loop: "{{ extra_static_routes_remove | default([]) }}"
      when: extra_static_routes_remove is defined and (extra_static_routes_remove | length) > 0
  tags:
    - vyos
    - extra_static_routes_remove

# Architectural shift (CLAUDE.md §3 row 8): corp IGP is OSPF area 0 + eBGP
# at the WAN edge only — no internal iBGP mesh. Setting `bgp: []` in
# host_vars stops new pushes but doesn't remove BGP a prior run may have
# left in the running config. This play deletes the entire `protocols bgp`
# subtree on hosts that opt in via `remove_vyos_bgp: true`. bs-edge-rtr
# (eBGP AS 65002 to bs-edge-fw) intentionally keeps its `bgp:` block.
- name: Remove stale VyOS iBGP (architectural shift to OSPF-IGP)
  hosts: vyos
  gather_facts: false
  tasks:
    - name: Delete protocols bgp via vyos_config
      vyos.vyos.vyos_config:
        lines:
          - "delete protocols bgp"
        save: true
      when: remove_vyos_bgp | default(false)
  tags:
    - vyos
    - remove_vyos_bgp

- name: pfSense firewalls
  hosts: pfsense
  gather_facts: false
  roles:
    - pfsense_firewall
  tags:
    - pfsense

# =============================================================================
# Foundation tier — Active Directory (vcab.lan + flightops.lan)
# =============================================================================
# Two-domain build: bs-dc01 promotes vcab.lan, fops-dc01 promotes flightops.lan.
# Each host in [pdc] picks up its own `domain_name` from group_vars/{vcab,
# flightops}.yml via inventory-group precedence, so a single `hosts: pdc` play
# fans out cleanly across both forests.

- name: dcpromo
  hosts: pdc
  gather_facts: false
  roles:
    - dcpromo
  tags:
    - dcpromo

- name: Create Users
  hosts: pdc
  gather_facts: false
  roles:
    - create_users
  tags:
    - create_users

- name: dns
  hosts: pdc
  gather_facts: false
  roles:
    - dns
  tags:
    - dns

# The customer's `dns` role creates AD zones and records but doesn't touch
# DNS forwarders, so anything outside vcab.lan / flightops.lan is unresolvable
# on the domain workstations. Point both DCs at is-inet's simulated public DNS
# (unbound binds the 8.8.8.8 / 8.8.4.4 / 1.1.1.1 aliases on is-inet — see
# PowerPlant ss-pp-ab/UPSTREAM_FIXES.md 2026-05-22 entry).
- name: Configure DNS forwarders to is-inet
  hosts: domain_controllers
  gather_facts: false
  tasks:
    - name: Point Windows DNS forwarder at is-inet
      ansible.windows.win_powershell:
        script: |
          $current = @((Get-DnsServerForwarder).IPAddress.IPAddressToString | Sort-Object)
          $desired = @('8.8.8.8', '8.8.4.4', '1.1.1.1') | Sort-Object
          if (-not (Compare-Object $current $desired -SyncWindow 0)) {
            $Ansible.Changed = $false
            Write-Output "DNS forwarder already set to: $($desired -join ', ')"
          } else {
            Set-DnsServerForwarder -IPAddress $desired -UseRootHint $false -Timeout 3
            $Ansible.Changed = $true
            Write-Output "DNS forwarder updated to: $($desired -join ', ')"
          }
  tags:
    - dns
    - dns_forwarder

# Pre-emptively strip 169.254.x.x APIPA addresses Windows assigns when the
# DHCP→static handoff lags (most common on .3 host in every subnet during
# PowerPlant). If APIPA stays, domain join fails with "The specified domain
# either does not exist or could not be contacted."
- name: Strip APIPA
  hosts: windows
  gather_facts: false
  roles:
    - strip_apipa
  tags:
    - strip_apipa

# Two Join Domain plays — one per forest. Each member host inherits its own
# `domain_name` from the vcab/flightops group_vars (members_vcab hosts are
# also in [vcab] via the vcab_workstations / vcab_services / vcab_engineering
# / vcab_soc subgroups; members_flightops hosts similarly under [flightops]).
- name: Join Domain — vcab.lan
  hosts: members_vcab
  gather_facts: false
  roles:
    - domain_member_retry
  tags:
    - domain_member_retry
    - join_vcab

- name: Join Domain — flightops.lan
  hosts: members_flightops
  gather_facts: false
  roles:
    - domain_member_retry
  tags:
    - domain_member_retry
    - join_flightops

# Promotes bs-dc02 into vcab.lan and fops-dc02 into flightops.lan. The
# additional_dc role joins each VM as a workstation first (using its
# domain_name from group_vars), then runs Install-ADDSDomainController.
- name: Additional DC
  hosts: additional_dc
  gather_facts: false
  roles:
    - additional_dc
  tags:
    - additional_dc

- name: dc_status
  hosts: domain_controllers
  gather_facts: false
  roles:
    - dc_status
  tags:
    - dc_status

# The customer's common/tasks/windows.yml "Disable control net DNS
# registration" task is a double-no-op (typo `Ehternet0` + misspelled
# `RegisterThisConnectionAddress` cmdlet param). Net result: every Windows
# host DDNS-registers BOTH Ethernet0 (mgmt 10.255.240.0/20) AND the
# data-plane adapter, so name resolution round-robins onto the mgmt IP
# (which is supposed to be out of play in-scenario).
#
# Disable DDNS on Ethernet0 on every Windows host and force a re-register
# so the data-plane record stays. The next play purges any 10.255.240.0/20
# records already in AD DNS. Logged in UPSTREAM_FIXES.md.
- name: Strip mgmt interface from AD DNS registration
  hosts: windows
  gather_facts: false
  tasks:
    - name: Disable DDNS on Ethernet0 (mgmt adapter)
      ansible.windows.win_powershell:
        script: |
          $iface = 'Ethernet0'
          $c = Get-DnsClient -InterfaceAlias $iface -ErrorAction SilentlyContinue
          if ($null -eq $c) {
            $Ansible.Changed = $false
            Write-Output "No $iface adapter present; nothing to do."
            return
          }
          if ($c.RegisterThisConnectionsAddress) {
            Set-DnsClient -InterfaceAlias $iface -RegisterThisConnectionsAddress $false
            ipconfig /registerdns | Out-Null
            $Ansible.Changed = $true
            Write-Output "Disabled DDNS on $iface; re-registered."
          } else {
            $Ansible.Changed = $false
            Write-Output "DDNS already disabled on $iface."
          }
  tags:
    - strip_mgmt_dns

# Scrub any 10.255.240.0/20 A records that already snuck into AD DNS before
# the strip_mgmt_dns play landed. Runs against both PDCs — each one targets
# its own forest's zone (`vcab.lan` on bs-dc01, `flightops.lan` on fops-dc01)
# via the per-host `domain_name`. PTR records in 240.255.10.in-addr.arpa are
# scoped to whatever reverse zones the dns role created — we don't expect
# any to be present yet, but log_only here to be safe.
- name: Purge mgmt-subnet A records from AD DNS
  hosts: pdc
  gather_facts: false
  tasks:
    - name: Remove A records in {{ domain_name }} whose IPv4 falls in 10.255.240.0/20
      ansible.windows.win_powershell:
        script: |
          $zone = '{{ domain_name }}'
          # 10.255.240.0/20 = 10.255.240.0 .. 10.255.255.255 (third octet 240..255)
          $stale = Get-DnsServerResourceRecord -ZoneName $zone -RRType A -ErrorAction SilentlyContinue |
            Where-Object {
              $ip = $_.RecordData.IPv4Address.ToString()
              if ($ip -notlike '10.255.*') { return $false }
              $third = [int]($ip.Split('.')[2])
              ($third -ge 240) -and ($third -le 255)
            }
          foreach ($r in $stale) {
            Remove-DnsServerResourceRecord -ZoneName $zone -InputObject $r -Force -ErrorAction Stop
          }
          if ($stale.Count -eq 0) {
            $Ansible.Changed = $false
            Write-Output "No stale 10.255.240.0/20 A records in $zone."
          } else {
            $Ansible.Changed = $true
            Write-Output "Removed $($stale.Count) stale A record(s) in $zone."
          }
  tags:
    - purge_mgmt_dns

